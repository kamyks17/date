<!DOCTYPE html>
<html lang="pl">
    <head>
        <link rel="stylesheet" href="styles.css">
    </head> 
    <body>
        <div class="container">
            <div class="gif_container">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMDVqZGlxaG5iMGNuenFramk5bnBxdXY1Yng1MnlqODZuZG96aGx4dCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9dHM/lN9MjFrGoMXOkQNZbM/giphy.gif">
            </div>
            <div class = "buttons">
                <button class="btn" id = "yesButton" onclick="nextPage()"><b>Yes</b></button>
                <button class="btn" id="noButton" onmouseover="moveButton()" onclick="moveButton()"><b>No</b></button>
                <script>
                    function nextPage() {
                        window.location.href = "yes.html";
                    }
                    
                    function moveButton() {
                        var x = Math.random() * (window.innerWidth - document.getElementById('noButton').offsetWidth) - 85;
                        var y = Math.random() * (window.innerHeight - document.getElementById('noButton').offsetHeight) - 48;
                        document.getElementById('noButton').style.left = `${x}px`;
                        document.getElementById('noButton').style.top = `${y}px`;
                    }
                </script> 
            </div>
        </div>
       
    </body> 
</html>
